name: 🚚 Release

on:
  pull_request:
    types:
      - opened
      - edited
      - labeled
      - unlabeled
      - synchronize
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
  pages: write
  id-token: write

env:
  RELEASE_COMMIT_PREFIX: "chore: release version"

jobs:
  changeset:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            docs:
              - 'docs/**'
              - 'zensical.toml'

  version:
    if: "!startsWith(github.event.head_commit.message, env.RELEASE_COMMIT_PREFIX)"
    outputs:
      release: ${{ steps.semver.outputs.release }}
      version: ${{ steps.semver.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: semver
        uses: ronaldphilipsen/semVersie@v2.3.2
        with:
          add-pr-label: ${{ github.event_name == 'pull_request' }}

  release:
    if: github.event_name == 'push' && needs.version.outputs.release == 'true'
    runs-on: ubuntu-latest
    needs: version
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Update version files
        run: |
          .github/scripts/bump_version.py ${{ needs.version.outputs.version }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Build plugin
        run: |
          npm install
          npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag
        run: |
          git add -A
          git commit -m "${{ env.RELEASE_COMMIT_PREFIX }} ${{ needs.version.outputs.version }}"
          git push origin main
          git tag ${{ needs.version.outputs.version }}
          git push origin ${{ needs.version.outputs.version }}

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=$(gh pr list --state merged --base main --json number,mergeCommit --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number")
          PR_TITLE=$(gh pr view $PR_NUMBER --json title -q '.title')
          PR_BODY=$(gh pr view $PR_NUMBER --json body -q '.body')
          RELEASE_NOTES="## ${PR_TITLE}

          ${PR_BODY}"
          gh release create "${{ needs.version.outputs.version }}" \
            --title="${{ needs.version.outputs.version }}" \
            --notes "$RELEASE_NOTES" \
            main.js manifest.json styles.css

  docs:
    name: Deploy Docs
    needs: changeset
    if: needs.changeset.outputs.docs == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install zensical
        run: pip install zensical

      - name: Build docs
        run: zensical build --clean

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
