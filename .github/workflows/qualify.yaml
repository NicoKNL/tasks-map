name: 💎 Qualify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  changeset:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - 'test/**'
              - 'main.js'
              - 'global.css'
              - 'styles.css'
              - 'esbuild.config.mjs'
              - 'tsconfig.json'
              - 'package.json'
              - 'package-lock.json'
              - 'eslint.config.mjs'
              - 'jest.config.js'
            docs:
              - 'docs/**'
              - 'zensical.toml'

  label:
    name: PR Labeler
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Label PR
        uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yaml
          sync-labels: true

  lint:
    name: Lint Check
    needs: changeset
    if: needs.changeset.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  format:
    name: Format Check
    needs: changeset
    if: needs.changeset.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format

  test:
    name: Test Suite
    needs: changeset
    if: needs.changeset.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage | tee coverage.txt

      - name: Jest coverage comment
        if: github.event_name == 'pull_request'
        uses: MishaKav/jest-coverage-comment@v1
        with:
          coverage-summary-path: coverage/coverage-summary.json
          coverage-path: coverage.txt
          title: Code Coverage
          summary-title: Coverage Summary
          badge-title: Coverage
          junitxml-title: ""
          coverage-title: Coverage Report
          coverage-path-prefix: src/

  build:
    name: Build Check
    needs: changeset
    if: needs.changeset.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc -noEmit -skipLibCheck

      - name: Build project
        run: node esbuild.config.mjs production

  docs:
    name: Docs Build Check
    needs: changeset
    if: needs.changeset.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install zensical
        run: pip install zensical

      - name: Build docs
        run: zensical build --clean
